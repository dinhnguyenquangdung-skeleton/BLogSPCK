<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT -->
      <div class="left">
        <div class="left-content">
          <h1>Blog của Dũng</h1>
          <p>Khám phá những sở thích của tôi 💻</p>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
      <h1>Đăng nhập</h1>
      <form action="#">
        <input
          class="user_valueemail"
          type="text"
          id="inputemail"
          placeholder="Email"
        />
        <p class="user_email"></p>
        <input
          class="user_valuepassword"
          type="password"
          id="inputpassword"
          placeholder="Password"
        />
        <button class="btn" id="btn_login" type="button">Đăng nhập</button>
      </form>
      
      <p>
        Chưa có tài khoản?
        <a href="register.html">Đăng ký ngay</a>
      </p>
    </div>
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyA7oeV_6LOhHanmv0x7rPky7_tFg8qQ9yQ",
        authDomain: "jsi13-9ebf7.firebaseapp.com",
        projectId: "jsi13-9ebf7",
        storageBucket: "jsi13-9ebf7.firebasestorage.app",
        messagingSenderId: "826706136731",
        appId: "1:826706136731:web:b1abbbd4a73477350f803e"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);

      //   Bước 1
      const auth = getAuth(app);

      //   Code thêm
      // Bước 2
      const loginbtn = document.querySelector("#btn_login");

      loginbtn.addEventListener("click", () => {
        const erremail = document.querySelector('#inputemail').value
        const errpassword = document.querySelector('#inputpassword').value

        if (!erremail || !errpassword) {
    alert("Nhập đầy đủ thông tin!");
    return;
  }

        signInWithEmailAndPassword(auth, erremail, errpassword)
          .then((userCredential) => {
      const user = userCredential.user;
      console.log("Đăng nhập thành công:", user);

      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
      });
    </script>
  </body>
</html>
