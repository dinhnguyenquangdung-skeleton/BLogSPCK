<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thêm bài</title>
    <link rel="stylesheet" href="./css/create.css" />
  </head>

  <body>
    <div class="form-container">
      <h2>Thêm bài viết</h2>

      <input id="title" placeholder="Nhập tiêu đề..." />
      <textarea id="content" placeholder="Nhập nội dung..."></textarea>

      <button onclick="createPost()">Đăng bài</button>
    </div>
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
      import {
        collection,
        getDocs,
        getFirestore,
        addDoc,
        deleteDoc,
        doc,
        updateDoc,
        increment,
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyA7oeV_6LOhHanmv0x7rPky7_tFg8qQ9yQ",
        authDomain: "jsi13-9ebf7.firebaseapp.com",
        projectId: "jsi13-9ebf7",
        storageBucket: "jsi13-9ebf7.firebasestorage.app",
        messagingSenderId: "826706136731",
        appId: "1:826706136731:web:b1abbbd4a73477350f803e",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);

      const db = getFirestore(app);

      window.createPost = async () => {
        const btn = document.querySelector("button");

        const title = document.getElementById("title").value.trim();
        const content = document.getElementById("content").value.trim();

        // ❗ Check rỗng
        if (!title || !content) {
          alert("Nhập đầy đủ thông tin");
          return;
        }

        try {
          // loading
          btn.innerText = "Đang đăng...";
          btn.disabled = true;

          await addDoc(collection(db, "myblog"), {
            Name_of_blog: title,

            describe: content,

            date: new Date().toLocaleDateString(),

            likes: 0,
          });
          // ✅ chuyển về admin
          window.location.href = "admin.html";
        } catch (err) {
          alert("Lỗi khi đăng!");
          console.error(err);
          btn.innerText = "Đăng bài";
          btn.disabled = false;
        }
      };
    </script>
  </body>
</html>
