<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Dũng Blog</title>
    <link rel="stylesheet" href="../css/blog.css" />
  </head>

  <body>
    <header>
      <h1>Blog của Dũng</h1>
      <div class="menu">
        <a href="login.html">Đăng xuất</a>
      </div>
    </header>
    <div class="container">
      <div class="sidebar">
        <h1>📂 Menu</h1>
        <h2><a href="#">🏠 Trang chủ</a></h2>
        <h2><a href="#">⭐ Yêu thích</a></h2>
        <h2><a href="#">⚙️ Quản lí</a></h2>
      </div>
      <!-- MAIN -->
      <div class="main">
        <!-- PROFILE -->
        <div class="profile">
          <img src="../SPCk/img/mylogo.png" alt="" />
          <h3>Dũng</h3>
          <p>Học sinh lớp 8 | Đang học lập trình 💻</p>
        </div>
        <div class="post"></div>
      </div>
    </div>
    <footer>
      <div class="footer-content">
        <h3>Blog của Dũng</h3>
        <p>Chia sẻ suy nghĩ, học tập và cuộc sống ✨</p>

        <div class="social">
          <a href="#">Facebook</a>
          <a href="#">GitHub</a>
          <a href="#">Email</a>
        </div>

        <p class="copyright">© 2026 Dũng. Năm mới tôi mới .</p>
      </div>
    </footer>
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
      import {
        collection,
        getDocs,
        getFirestore,
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyA7oeV_6LOhHanmv0x7rPky7_tFg8qQ9yQ",
        authDomain: "jsi13-9ebf7.firebaseapp.com",
        projectId: "jsi13-9ebf7",
        storageBucket: "jsi13-9ebf7.firebasestorage.app",
        messagingSenderId: "826706136731",
        appId: "1:826706136731:web:b1abbbd4a73477350f803e",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);

      const db = getFirestore(app);

      const eleBody = document.querySelector(".post");
      const querySnapshot = await getDocs(collection(db, "myblog"));
      querySnapshot.forEach((doc) => {
        console.log(doc.data());

        eleBody.innerHTML += `
        <div class="post-item"> 
          <a href = "details.html?id=${doc.id}">
          <h3>${doc.data().Name_of_blog}</h3> <br>       
          <p>${doc.data().date}</p> <br>
          </a>
        </div>
        `;
      });
    </script>
  </body>
</html>
